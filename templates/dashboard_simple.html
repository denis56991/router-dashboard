<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Router Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .status-bar {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .status-dot.online { background: #27ae60; animation: pulse 2s infinite; }
        .status-dot.offline { background: #e74c3c; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .load-values {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        
        .load-item { text-align: center; }
        .load-label { font-size: 0.9em; color: #999; }
        .load-number { font-size: 1.8em; font-weight: bold; color: #333; }
        
        .progress-bar {
            margin-top: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #667eea;
            width: 0%;
            height: 20px;
            transition: width 0.3s;
        }
        
        .timestamp {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .refresh-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .metrics-grid { grid-template-columns: 1fr; }
            .load-number { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 SNR-CPE Router Dashboard</h1>
        
        <div class="status-bar">
            <div class="status">
                <div class="status-dot online" id="statusDot"></div>
                <span id="statusText">Connected</span>
            </div>
            <div>🏠 Router: SNR-CPE-ME2-Lite</div>
            <div>🕒 <span id="uptime">-</span></div>
            <button class="refresh-btn" onclick="loadMetrics()">🔄 Refresh</button>
        </div>
        
        <div class="metrics-grid">
            <!-- CPU Load Average -->
            <div class="card">
                <h3>⚡ CPU Load Average</h3>
                <div class="load-values">
                    <div class="load-item">
                        <div class="load-label">1 min</div>
                        <div class="load-number" id="load1">-</div>
                    </div>
                    <div class="load-item">
                        <div class="load-label">5 min</div>
                        <div class="load-number" id="load5">-</div>
                    </div>
                    <div class="load-item">
                        <div class="load-label">15 min</div>
                        <div class="load-number" id="load15">-</div>
                    </div>
                </div>
                <div style="margin-top: 10px; text-align: center;">💻 Cores: <span id="cpu_cores">-</span></div>
            </div>
            
            <!-- Memory Usage -->
            <div class="card">
                <h3>💾 Memory Usage</h3>
                <div class="metric-value">
                    <span id="mem_used">-</span> MB / <span id="mem_total">-</span> MB
                </div>
                <div>📊 Used: <span id="mem_percent">-</span>%</div>
                <div>🆓 Free: <span id="mem_free">-</span> MB</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="mem_bar"></div>
                </div>
            </div>
            
            <!-- System Status -->
            <div class="card">
                <h3>🖥️ System Status</h3>
                <div>🔌 Active Connections: <span id="connections">-</span></div>
                <div>🌡️ Temperature: <span id="temperature">N/A</span></div>
                <div>💾 Storage: <span id="disk_info">-</span></div>
            </div>
        </div>
        
        <div class="timestamp">
            📡 Last Update: <span id="timestamp">Loading...</span>
        </div>
    </div>
    
    <script>
        // Функция загрузки метрик
        async function loadMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                // Load Average
                if (data.load_avg) {
                    document.getElementById('load1').innerText = data.load_avg.load1.toFixed(2);
                    document.getElementById('load5').innerText = data.load_avg.load5.toFixed(2);
                    document.getElementById('load15').innerText = data.load_avg.load15.toFixed(2);
                }
                
                // Memory
                if (data.memory) {
                    document.getElementById('mem_used').innerText = data.memory.used;
                    document.getElementById('mem_total').innerText = data.memory.total;
                    document.getElementById('mem_free').innerText = data.memory.free;
                    document.getElementById('mem_percent').innerText = data.memory.percent;
                    document.getElementById('mem_bar').style.width = data.memory.percent + '%';
                    
                    const memBar = document.getElementById('mem_bar');
                    if (data.memory.percent > 90) memBar.style.background = '#e74c3c';
                    else if (data.memory.percent > 75) memBar.style.background = '#f39c12';
                    else memBar.style.background = '#27ae60';
                }
                
                // Uptime
                if (data.uptime) {
                    document.getElementById('uptime').innerText = data.uptime;
                }
                
                // Connections
                if (data.connections) {
                    document.getElementById('connections').innerText = data.connections;
                }
                
                // Temperature
                if (data.temperature) {
                    document.getElementById('temperature').innerHTML = data.temperature;
                }
                
                // Disk info
                if (data.disk) {
                    document.getElementById('disk_info').innerHTML = `${data.disk.used} / ${data.disk.total} (${data.disk.percent})`;
                }
                
                // CPU Cores
                if (data.cpu_cores) {
                    document.getElementById('cpu_cores').innerText = data.cpu_cores;
                }
                
                // Timestamp
                if (data.timestamp) {
                    document.getElementById('timestamp').innerHTML = data.timestamp;
                }
                
                document.getElementById('statusDot').className = 'status-dot online';
                document.getElementById('statusText').innerText = 'Connected';
                
            } catch (error) {
                console.error('Error loading metrics:', error);
                document.getElementById('timestamp').innerHTML = 'Error loading data';
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').innerText = 'Error';
            }
        }
        
        // Загружаем сразу при открытии
        loadMetrics();
        
        // Автообновление каждые 3 секунды
        setInterval(loadMetrics, 3000);
    </script>
</body>
</html>
