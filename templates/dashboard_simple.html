<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROUTER DASHBOARD // NETRUNNER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', 'Courier New', monospace;
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #000000 100%);
            min-height: 100vh;
            padding: 25px;
            color: #00ff9d;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Анимированный фон */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(90deg, rgba(0,100,255,0.03) 0px, rgba(0,100,255,0.03) 1px, transparent 1px, transparent 50px),
                repeating-linear-gradient(0deg, rgba(0,255,157,0.02) 0px, rgba(0,255,157,0.02) 1px, transparent 1px, transparent 50px);
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0,100,255,0.05) 0%, transparent 50%);
            pointer-events: none;
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* Neon заголовок */
        h1 {
            color: #00ff9d;
            text-align: center;
            margin-bottom: 8px;
            font-size: 2em;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff9d, 0 0 20px rgba(0,255,157,0.5);
        }
        
        .header-container {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 0.7em;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff;
            letter-spacing: 3px;
        }
        
        /* Статус бар */
        .status-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0,255,157,0.3);
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.9em;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }
        
        .status-dot.online { 
            background: #00ff9d;
            box-shadow: 0 0 10px #00ff9d;
        }
        
        .status-dot.online::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff9d;
            animation: ping 1.5s infinite;
        }
        
        @keyframes ping {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .status-dot.offline { background: #ff0066; box-shadow: 0 0 10px #ff0066; }
        
        .current-time {
            font-family: monospace;
            font-size: 1.1em;
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff;
        }
        
        /* Карточки - чуть крупнее */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0,255,157,0.3);
            padding: 18px;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: #00ff9d;
            box-shadow: 0 0 15px rgba(0,255,157,0.2);
        }
        
        .card h3 {
            color: #ff00ff;
            margin-bottom: 12px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-left: 2px solid #ff00ff;
            padding-left: 10px;
        }
        
        /* LOAD значения - крупнее */
        .load-values {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            gap: 10px;
        }
        
        .load-item {
            text-align: center;
            flex: 1;
        }
        
        .load-label {
            font-size: 0.7em;
            color: #00ff9d;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        
        .load-number {
            font-size: 1.6em;
            font-weight: 900;
            color: #00ff9d;
            text-shadow: 0 0 5px #00ff9d;
            font-family: monospace;
        }
        
        .progress-bar {
            margin-top: 10px;
            background: rgba(0,255,157,0.1);
            border: 1px solid #00ff9d;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #00ff9d, #ff00ff);
            width: 0%;
            height: 12px;
            transition: width 0.3s;
            box-shadow: 0 0 5px #00ff9d;
        }
        
        /* Строки данных - крупнее */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            font-size: 0.85em;
        }
        
        .data-label {
            color: #00ff9d;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        
        .data-value {
            color: #ff00ff;
            font-weight: bold;
            text-shadow: 0 0 3px #ff00ff;
            font-family: monospace;
            font-size: 1em;
        }
        
        /* VPN тумблер */
        .vpn-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding: 8px 10px;
            background: rgba(0,255,157,0.05);
            border: 1px solid rgba(0,255,157,0.3);
        }
        
        .vpn-status-text {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        
        .vpn-status-text.active {
            color: #00ff9d;
            text-shadow: 0 0 5px #00ff9d;
        }
        
        .vpn-status-text.inactive {
            color: #ff0066;
            text-shadow: 0 0 5px #ff0066;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,0,102,0.3);
            transition: 0.3s;
            border: 1px solid #ff0066;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #ff0066;
            transition: 0.3s;
            box-shadow: 0 0 5px #ff0066;
        }
        
        input:checked + .slider {
            background-color: rgba(0,255,157,0.3);
            border-color: #00ff9d;
        }
        
        input:checked + .slider:before {
            transform: translateX(22px);
            background-color: #00ff9d;
            box-shadow: 0 0 10px #00ff9d;
        }
        
        .slider.round {
            border-radius: 34px;
        }
        
        .slider.round:before {
            border-radius: 50%;
        }
        
        /* Футер */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8em;
            opacity: 0.7;
            letter-spacing: 3px;
            border-top: 1px solid rgba(0,255,157,0.3);
            padding-top: 15px;
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        @media (max-width: 768px) {
            .metrics-grid { grid-template-columns: 1fr; }
            .load-number { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1>&gt;&gt; NETRUNNER DASH &lt;&lt;</h1>
            <div class="subtitle">[ CYBERPUNK INTERFACE ]</div>
        </div>
        
        <div class="status-bar">
            <div class="status">
                <div class="status-dot online" id="statusDot"></div>
                <span id="statusText">ONLINE</span>
                <span class="blink">_</span>
            </div>
            <div class="current-time" id="currentTime">--:--:--</div>
            <div>UPTIME: <span id="uptime">-</span></div>
            <div>🌐 <span id="external_ip">-</span></div>
        </div>
        
        <div class="metrics-grid">
            <!-- SYSTEM STATUS -->
            <div class="card">
                <h3>SYSTEM</h3>
                <div class="load-values">
                    <div class="load-item">
                        <div class="load-label">1m</div>
                        <div class="load-number" id="load1">-</div>
                    </div>
                    <div class="load-item">
                        <div class="load-label">5m</div>
                        <div class="load-number" id="load5">-</div>
                    </div>
                    <div class="load-item">
                        <div class="load-label">15m</div>
                        <div class="load-number" id="load15">-</div>
                    </div>
                </div>
                <div class="data-row">
                    <span class="data-label">ARP:</span>
                    <span class="data-value" id="connections">-</span>
                </div>
                <div class="data-row">
                    <span class="data-label">STORAGE:</span>
                    <span class="data-value" id="disk_info">-</span>
                </div>
            </div>
            
            <!-- MEMORY USAGE -->
            <div class="card">
                <h3>MEMORY</h3>
                <div class="data-row">
                    <span class="data-label">USED/FREE:</span>
                    <span class="data-value"><span id="mem_used">-</span>/<span id="mem_free">-</span> MB</span>
                </div>
                <div class="data-row">
                    <span class="data-label">LOAD:</span>
                    <span class="data-value"><span id="mem_percent">-</span>%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="mem_bar"></div>
                </div>
            </div>
            
            <!-- VPN TUNNEL -->
            <div class="card">
                <h3>VPN</h3>
                <div class="data-row">
                    <span class="data-label">SERVER:</span>
                    <span class="data-value">amsterdam</span>
                </div>
                <div class="data-row" id="vpn_ip_line" style="display: none;">
                    <span class="data-label">IP:</span>
                    <span class="data-value" id="vpn_ip">-</span>
                </div>
                <div class="vpn-toggle">
                    <span class="vpn-status-text" id="vpnStatusLabel">OFFLINE</span>
                    <label class="switch">
                        <input type="checkbox" id="vpnToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="footer">
            SNR-CPE-ME2-Lite
        </div>
    </div>
    
    <script>
        let isToggling = false;
        
        // Форматирование UPTIME в дни/часы/минуты
        function formatUptime(uptimeStr) {
            if (!uptimeStr || uptimeStr === '-') return '-';
            
            let days = 0, hours = 0, minutes = 0;
            
            const daysMatch = uptimeStr.match(/(\d+)\s*days?/);
            const hoursMatch = uptimeStr.match(/(\d+)\s*hours?/);
            const minutesMatch = uptimeStr.match(/(\d+)\s*min/);
            
            if (daysMatch) days = parseInt(daysMatch[1]);
            if (hoursMatch) hours = parseInt(hoursMatch[1]);
            if (minutesMatch) minutes = parseInt(minutesMatch[1]);
            
            if (days > 0) return `${days}d ${hours}h ${minutes}m`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            return `${minutes}m`;
        }
        
        // Обновление текущего времени
        function updateCurrentTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour12: false });
            document.getElementById('currentTime').innerHTML = timeStr;
        }
        
        async function loadMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                if (data.load_avg) {
                    document.getElementById('load1').innerText = data.load_avg.load1.toFixed(2);
                    document.getElementById('load5').innerText = data.load_avg.load5.toFixed(2);
                    document.getElementById('load15').innerText = data.load_avg.load15.toFixed(2);
                }
                
                if (data.memory && data.memory.total > 0) {
                    const used = data.memory.used;
                    const free = data.memory.free;
                    const percent = data.memory.percent;
                    
                    document.getElementById('mem_used').innerText = used;
                    document.getElementById('mem_free').innerText = free;
                    document.getElementById('mem_percent').innerText = percent;
                    document.getElementById('mem_bar').style.width = percent + '%';
                    
                    const memBar = document.getElementById('mem_bar');
                    if (percent > 90) memBar.style.background = '#ff0066';
                    else if (percent > 75) memBar.style.background = '#ff00ff';
                    else memBar.style.background = 'linear-gradient(90deg, #00ff9d, #ff00ff)';
                } else if (data.memory) {
                    document.getElementById('mem_used').innerText = 'N/A';
                    document.getElementById('mem_free').innerText = 'N/A';
                    document.getElementById('mem_percent').innerText = 'N/A';
                }
                
                if (data.uptime) {
                    document.getElementById('uptime').innerText = formatUptime(data.uptime);
                }
                
                if (data.connections) document.getElementById('connections').innerText = data.connections;
                if (data.external_ip) document.getElementById('external_ip').innerHTML = data.external_ip;
                if (data.disk) document.getElementById('disk_info').innerHTML = `${data.disk.used}/${data.disk.total}(${data.disk.percent})`;
                
                if (data.vpn_status) {
                    const toggle = document.getElementById('vpnToggle');
                    const statusLabel = document.getElementById('vpnStatusLabel');
                    const vpnIpLine = document.getElementById('vpn_ip_line');
                    const vpnIpSpan = document.getElementById('vpn_ip');
                    
                    if (data.vpn_status === 'active') {
                        toggle.checked = true;
                        statusLabel.innerHTML = 'ACTIVE';
                        statusLabel.className = 'vpn-status-text active';
                        if (data.vpn_ip) {
                            vpnIpSpan.innerHTML = data.vpn_ip;
                            vpnIpLine.style.display = 'flex';
                        }
                    } else {
                        toggle.checked = false;
                        statusLabel.innerHTML = 'INACTIVE';
                        statusLabel.className = 'vpn-status-text inactive';
                        vpnIpLine.style.display = 'none';
                    }
                }
                
                document.getElementById('statusDot').className = 'status-dot online';
                document.getElementById('statusText').innerText = 'ONLINE';
                
            } catch (error) {
                console.error('Error loading metrics:', error);
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').innerText = 'OFFLINE';
            }
        }
        
        async function toggleVPN() {
            if (isToggling) return;
            isToggling = true;
            
            const toggle = document.getElementById('vpnToggle');
            const originalState = toggle.checked;
            toggle.disabled = true;
            
            try {
                const response = await fetch('/api/toggle_vpn', { method: 'POST' });
                const result = await response.json();
                
                if (result.status === 'success') {
                    setTimeout(() => {
                        loadMetrics();
                        setTimeout(loadMetrics, 1000);
                    }, 500);
                } else {
                    toggle.checked = originalState;
                    console.error('VPN toggle failed:', result.message);
                }
            } catch (error) {
                console.error('Error toggling VPN:', error);
                toggle.checked = originalState;
            } finally {
                toggle.disabled = false;
                isToggling = false;
            }
        }
        
        document.getElementById('vpnToggle').addEventListener('change', toggleVPN);
        
        updateCurrentTime();
        setInterval(updateCurrentTime, 1000);
        
        loadMetrics();
        setInterval(loadMetrics, 1000);
    </script>
</body>
</html>
